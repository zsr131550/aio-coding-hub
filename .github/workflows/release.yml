name: release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing or new release tag to build, e.g. aio-coding-hub-v0.60.6"
        required: false
        type: string
      target_commitish:
        description: "Commit SHA for a new manual release tag"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.manual_release.outputs.release_created || steps.release.outputs.release_created }}
      tag_name: ${{ steps.manual_release.outputs.tag_name || steps.release.outputs.tag_name }}
      release_id: ${{ steps.manual_release.outputs.id || steps.release.outputs.id }}
      checkout_ref: ${{ steps.resolve_release_ref.outputs.checkout_ref }}
      build_matrix: ${{ steps.support_matrix.outputs.build_matrix }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Validate support matrix contract
        run: node scripts/support-matrix.mjs check

      - id: support_matrix
        name: Load release support matrix
        shell: bash
        run: |
          set -euo pipefail
          echo "build_matrix=$(node scripts/support-matrix.mjs build-matrix)" >> "$GITHUB_OUTPUT"

      - id: release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.release_tag == '' }}
        uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main
          skip-github-pull-request: "${{ github.event_name == 'push' && contains(github.event.head_commit.message, 'chore(main): release aio-coding-hub ') }}"
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - id: manual_release
        name: Use or create manual release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          TARGET_COMMITISH: ${{ inputs.target_commitish || github.sha }}
        run: |
          set -euo pipefail

          tag="$RELEASE_TAG"
          target="$TARGET_COMMITISH"

          if release_id="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json databaseId --jq .databaseId 2>/dev/null)"; then
            echo "Using existing release for $tag"
            checkout_ref="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json targetCommitish --jq .targetCommitish)"
          else
            version="${tag#aio-coding-hub-v}"
            notes_file="$(mktemp)"
            node - "$version" > "$notes_file" <<'NODE'
          const fs = require('fs');
          const version = process.argv[2];
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const lines = changelog.split(/\r?\n/);
          const heading = new RegExp(`^## \\[${version.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\]`);
          const start = lines.findIndex((line) => heading.test(line));
          if (start === -1) {
            console.log(`Release ${version}`);
            process.exit(0);
          }
          const end = lines.findIndex((line, index) => index > start && line.startsWith('## '));
          console.log(lines.slice(start + 1, end === -1 ? lines.length : end).join('\n').trim());
          NODE

            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$target" \
              --title "aio-coding-hub: v$version" \
              --notes-file "$notes_file" \
              --draft

            release_id="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json databaseId --jq .databaseId)"
            checkout_ref="$target"
          fi

          if git fetch --force origin "refs/tags/$tag:refs/tags/$tag" >/dev/null 2>&1; then
            checkout_ref="$(git rev-parse "$tag^{}")"
          fi

          echo "release_created=true" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag" >> "$GITHUB_OUTPUT"
          echo "id=$release_id" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"

      - id: resolve_release_ref
        name: Resolve release checkout ref
        if: ${{ steps.manual_release.outputs.release_created == 'true' || steps.release.outputs.release_created == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          RELEASE_TAG: ${{ steps.manual_release.outputs.tag_name || steps.release.outputs.tag_name }}
          FALLBACK_REF: ${{ steps.manual_release.outputs.checkout_ref || github.sha }}
        run: |
          set -euo pipefail

          tag="$RELEASE_TAG"
          fallback_ref="$FALLBACK_REF"

          if [[ -z "$tag" ]]; then
            echo "Cannot resolve release checkout ref without a release tag." >&2
            exit 1
          fi

          fetch_release_tag() {
            for attempt in 1 2 3; do
              if git fetch --force origin "refs/tags/$tag:refs/tags/$tag" >/dev/null 2>&1; then
                return 0
              fi
              sleep "$((attempt * 2))"
            done
            return 1
          }

          resolve_commit_sha() {
            local ref="$1"
            if [[ -z "$ref" ]]; then
              echo "Cannot resolve an empty release target." >&2
              return 1
            fi

            if git rev-parse --verify "${ref}^{commit}" >/dev/null 2>&1; then
              git rev-parse "${ref}^{commit}"
              return 0
            fi

            if git fetch --no-tags --depth=1 origin "$ref" >/dev/null 2>&1; then
              git rev-parse "FETCH_HEAD^{commit}"
              return 0
            fi

            gh api "repos/$GITHUB_REPOSITORY/commits/$ref" --jq .sha
          }

          if fetch_release_tag; then
            checkout_ref="$(git rev-parse "$tag^{commit}")"
            echo "Release tag $tag is fetchable at $checkout_ref."
          else
            release_target="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json targetCommitish --jq '.targetCommitish // ""' 2>/dev/null || true)"
            if [[ -z "$release_target" || "$release_target" == "$tag" || ! "$release_target" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
              release_target="$fallback_ref"
            fi

            target_sha="$(resolve_commit_sha "$release_target")"
            echo "Release tag $tag is not fetchable; creating lightweight tag at $target_sha."

            if ! gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f "ref=refs/tags/$tag" \
              -f "sha=$target_sha" >/tmp/create-release-tag.json 2>/tmp/create-release-tag.err; then
              if ! fetch_release_tag; then
                cat /tmp/create-release-tag.err >&2
                exit 1
              fi
            else
              fetch_release_tag
            fi

            checkout_ref="$(git rev-parse "$tag^{commit}")"
            if [[ "$checkout_ref" != "$target_sha" ]]; then
              echo "Release tag $tag resolves to $checkout_ref, expected $target_sha." >&2
              exit 1
            fi
          fi

          # Build jobs must checkout an immutable commit SHA. Draft GitHub Releases
          # can exist before their Git tag is fetchable, which breaks tag checkout.
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"

      - name: Check release PR changelog range
        if: steps.release.outputs.prs_created == 'true' && steps.release.outputs.release_created != 'true'
        env:
          RELEASE_PLEASE_PRS: ${{ steps.release.outputs.prs }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: node scripts/check-release-pr-changelog.mjs

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.release-please.outputs.build_matrix) }}

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.release-please.outputs.checkout_ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust 1.90.0
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Prepare updater signing key (validate password)
        shell: bash
        run: |
          set -euo pipefail

          raw_key="${TAURI_SIGNING_PRIVATE_KEY_SECRET:-}"
          raw_pwd="${TAURI_SIGNING_PRIVATE_KEY_PASSWORD_SECRET:-}"

          if [[ -z "${raw_key//[[:space:]]/}" ]]; then
            echo "Missing required secret: TAURI_SIGNING_PRIVATE_KEY" >&2
            exit 1
          fi
          if [[ -z "$raw_pwd" ]]; then
            echo "Missing required secret: TAURI_SIGNING_PRIVATE_KEY_PASSWORD" >&2
            exit 1
          fi

          # Tauri v2 updater key is stored as a single-line base64 string (as generated by `tauri signer generate --ci`).
          # Normalize by stripping whitespace to avoid accidental newline issues in GitHub Secrets.
          key_b64="$(printf '%s' "$raw_key" | tr -d '\r\n\t ')"
          printf '%s' "$key_b64" > tauri-updater.key
          chmod 600 tauri-updater.key

          echo "::add-mask::$raw_pwd"
          echo "sign-test" > sign-test.txt

          if ! pnpm tauri signer sign -f tauri-updater.key -p "$raw_pwd" sign-test.txt >/dev/null 2>sign-check.err; then
            cat sign-check.err
            echo "Signing key/password check failed." >&2
            exit 1
          fi

          rm -f sign-test.txt.sig sign-check.err

          echo "TAURI_SIGNING_PRIVATE_KEY=$key_b64" >> "$GITHUB_ENV"
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$raw_pwd" >> "$GITHUB_ENV"
        env:
          TAURI_SIGNING_PRIVATE_KEY_SECRET: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD_SECRET: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - id: tauri
        name: Build & upload (Tauri)
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        with:
          releaseId: ${{ needs.release-please.outputs.release_id }}
          tagName: ${{ needs.release-please.outputs.tag_name }}
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          # Avoid matrix race on the shared `latest.json` asset; we generate/upload it in a dedicated job.
          includeUpdaterJson: false
      - name: Prepare stable updater assets (+ macOS zip)
        shell: bash
        run: |
          set -euo pipefail
          node scripts/support-matrix.mjs prepare-stable-assets \
            --artifact-paths "$ARTIFACT_PATHS_JSON" \
            --updater-platform "${{ matrix.updater_platform }}" \
            --stable-label "${{ matrix.stable_label }}" \
            --output-dir stable-assets
        env:
          ARTIFACT_PATHS_JSON: ${{ steps.tauri.outputs.artifactPaths }}

      - name: Build macOS zip (portable)
        if: startsWith(matrix.updater_platform, 'darwin-')
        shell: bash
        run: |
          set -euo pipefail

          label="${{ matrix.stable_label }}"
          tgz="stable-assets/aio-coding-hub-${label}.tar.gz"
          if [[ ! -f "$tgz" ]]; then
            echo "Missing tarball: $tgz"
            ls -la stable-assets || true
            exit 1
          fi

          tmp="$(mktemp -d)"
          tar -xzf "$tgz" -C "$tmp"
          app_path="$(find "$tmp" -maxdepth 2 -name "*.app" -type d | head -n 1 || true)"
          if [[ -z "$app_path" ]]; then
            echo "No .app found inside $tgz"
            find "$tmp" -maxdepth 3 -print || true
            exit 1
          fi

          out="stable-assets/aio-coding-hub-${label}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$out"
          echo "Created zip: $out"

      - name: Build Windows portable ZIP
        if: startsWith(matrix.updater_platform, 'windows-')
        shell: pwsh
        run: |
          $label = "${{ matrix.stable_label }}"
          $targetDir = "src-tauri/target/${{ matrix.target }}/release"

          # Find the built application exe, not the bundled setup package.
          $exeName = "AIO Coding Hub.exe"
          $exePath = Join-Path $targetDir $exeName

          if (-not (Test-Path $exePath)) {
            $exeName = "aio-coding-hub.exe"
            $exePath = Join-Path $targetDir $exeName
          }

          if (-not (Test-Path $exePath)) {
            Write-Error "Cannot find built exe in $targetDir"
            Get-ChildItem $targetDir -Filter "*.exe" | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          # Create a temp directory for the portable package
          $portableDir = "portable-build/AIO Coding Hub"
          New-Item -ItemType Directory -Path $portableDir -Force | Out-Null

          # Copy the exe
          Copy-Item $exePath $portableDir

          # Copy resources if they exist (icons, webview assets, etc.)
          $resourceDir = Join-Path $targetDir "resources"
          if (Test-Path $resourceDir) {
            Copy-Item -Recurse $resourceDir (Join-Path $portableDir "resources")
          }

          # Create the ZIP
          $zipPath = "stable-assets/aio-coding-hub-${label}-portable.zip"
          Compress-Archive -Path "$portableDir/*" -DestinationPath $zipPath -Force

          Write-Host "Created portable ZIP: $zipPath"
          Get-Item $zipPath | Select-Object Name, Length

      - name: Build Wayland-compatible AppImage (Linux only)
        if: startsWith(matrix.updater_platform, 'linux-')
        shell: bash
        run: |
          set -euo pipefail

          # Fetch pinned stable release of appimagetool (no FUSE required).
          TOOL_URL="https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage"
          TOOL_SHA256="ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0"
          TOOL_BIN="$(mktemp)"
          node scripts/fetch-checked-file.mjs \
            --url "$TOOL_URL" \
            --sha256 "$TOOL_SHA256" \
            --output "$TOOL_BIN"
          chmod +x "$TOOL_BIN"

          label="${{ matrix.stable_label }}"
          src="stable-assets/aio-coding-hub-${label}.AppImage"
          out="stable-assets/aio-coding-hub-${label}-wayland.AppImage"

          APPIMAGETOOL="$TOOL_BIN" ./scripts/repack-linux-appimage-wayland.sh "$src" "$out"

          rm -f "$TOOL_BIN"

          echo "Wayland AppImage: $out"
          ls -lh "$out"

      - name: Upload stable assets (workflow artifact)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: stable-assets-${{ matrix.updater_platform }}
          path: stable-assets/*
          if-no-files-found: error

      - name: Upload stable assets (GitHub Release)
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: stable-assets/*
          fail_on_unmatched_files: true

  assemble-latest-json:
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.release-please.outputs.checkout_ref }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Download stable assets (workflow artifacts)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: stable-assets-*
          merge-multiple: true
          path: stable-assets

      - name: Fetch release body
        id: release_body
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          script: |
            const releaseId = Number('${{ needs.release-please.outputs.release_id }}');
            if (!Number.isFinite(releaseId) || releaseId <= 0) {
              core.setFailed(`Invalid release_id: ${releaseId}`);
              return;
            }

            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });

            core.setOutput('body', release.body || '');

      - name: Generate latest.json
        shell: bash
        run: |
          set -euo pipefail
          node scripts/support-matrix.mjs generate-latest-json \
            --tag "${{ needs.release-please.outputs.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pub-date "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --stable-assets-dir stable-assets \
            --output latest.json
        env:
          RELEASE_BODY: ${{ steps.release_body.outputs.body }}
          FALLBACK_NOTES: "See release: https://github.com/${{ github.repository }}/releases/tag/${{ needs.release-please.outputs.tag_name }}"

      - name: Delete existing latest.json (best-effort)
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          script: |
            const releaseId = Number('${{ needs.release-please.outputs.release_id }}');
            if (!Number.isFinite(releaseId) || releaseId <= 0) {
              core.setFailed(`Invalid release_id: ${releaseId}`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner,
              repo,
              release_id: releaseId,
              per_page: 100,
            });

            const existing = assets.find((a) => a && a.name === 'latest.json');
            if (!existing) {
              core.info('No existing latest.json asset found.');
              return;
            }

            core.info(`Deleting existing latest.json asset id=${existing.id}`);
            await github.rest.repos.deleteReleaseAsset({
              owner,
              repo,
              asset_id: existing.id,
            });

      - name: Upload latest.json (GitHub Release)
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: latest.json
          fail_on_unmatched_files: true

  publish:
    needs: [release-please, build, assemble-latest-json]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub Release (unset draft)
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          script: |
            const releaseId = Number('${{ needs.release-please.outputs.release_id }}');
            if (!Number.isFinite(releaseId) || releaseId <= 0) {
              core.setFailed(`Invalid release_id: ${releaseId}`);
              return;
            }

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              draft: false,
            });

  publish-homebrew-cask:
    needs: [release-please, publish]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY || 'FingerCaster/homebrew-aio-coding-hub' }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Generate Homebrew Cask
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          release_assets_api="repos/${{ github.repository }}/releases/${{ needs.release-please.outputs.release_id }}/assets"

          macos_arm_sha256="$(
            gh api "$release_assets_api" --paginate \
              --jq '.[] | select(.name == "aio-coding-hub-macos-arm.zip") | .digest' \
              | sed 's/^sha256://'
          )"
          macos_intel_sha256="$(
            gh api "$release_assets_api" --paginate \
              --jq '.[] | select(.name == "aio-coding-hub-macos-intel.zip") | .digest' \
              | sed 's/^sha256://'
          )"

          if [[ -z "$macos_arm_sha256" || -z "$macos_intel_sha256" ]]; then
            echo "Missing macOS zip digests for Homebrew Cask generation." >&2
            echo "macos_arm_sha256=${macos_arm_sha256:-<missing>}" >&2
            echo "macos_intel_sha256=${macos_intel_sha256:-<missing>}" >&2
            exit 1
          fi

          node scripts/support-matrix.mjs homebrew-cask \
            --tag "${{ needs.release-please.outputs.tag_name }}" \
            --repo "${{ github.repository }}" \
            --macos-arm-sha256 "$macos_arm_sha256" \
            --macos-intel-sha256 "$macos_intel_sha256" \
            --output generated-homebrew/Casks/aio-coding-hub.rb

      - name: Skip Homebrew tap sync when token is missing
        if: env.HOMEBREW_TAP_TOKEN == ''
        run: |
          echo "HOMEBREW_TAP_TOKEN is not configured; generated Cask will not be pushed."

      - name: Sync Homebrew tap
        if: env.HOMEBREW_TAP_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail

          # Fail fast with an actionable message when the token cannot access
          # the tap repo — git's own failure mode is a cryptic
          # "could not read Username" prompt.
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${HOMEBREW_TAP_TOKEN}" \
            "https://api.github.com/repos/${HOMEBREW_TAP_REPOSITORY}")
          if [[ "$status" != "200" ]]; then
            echo "::error::HOMEBREW_TAP_TOKEN cannot access ${HOMEBREW_TAP_REPOSITORY} (HTTP ${status}). The PAT must be valid and have contents read/write on the tap repository."
            exit 1
          fi

          git check-ref-format --normalize "refs/heads/main" >/dev/null
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # git-over-HTTPS expects Basic auth (this is what actions/checkout
          # sends); a raw "bearer" header is rejected for some token types.
          auth_header="AUTHORIZATION: basic $(printf 'x-access-token:%s' "${HOMEBREW_TAP_TOKEN}" | base64 -w0)"

          git -c http.extraheader="$auth_header" \
            clone "https://github.com/${HOMEBREW_TAP_REPOSITORY}.git" homebrew-tap

          mkdir -p homebrew-tap/Casks
          cp generated-homebrew/Casks/aio-coding-hub.rb homebrew-tap/Casks/aio-coding-hub.rb

          cd homebrew-tap
          if git diff --quiet -- Casks/aio-coding-hub.rb; then
            echo "Homebrew Cask is already up to date."
            exit 0
          fi

          git add Casks/aio-coding-hub.rb
          git commit -m "chore: update aio-coding-hub ${{ needs.release-please.outputs.tag_name }}"
          git -c http.extraheader="$auth_header" push origin HEAD
